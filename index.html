<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>OPTIX — Options Trading Platform</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#06080f;--surface:#0c1018;--surfaceUp:#111827;
--border:#1c2333;--borderGold:rgba(180,145,60,0.35);
--gold:#c9a84c;--goldLight:#e2c97e;--goldDim:rgba(201,168,76,0.12);--goldDimB:rgba(201,168,76,0.25);
--text:#e8eaf0;--textMid:#8a95a8;--textDim:#3d4a5c;
--green:#34d399;--red:#f87171;--orange:#fb923c;--blue:#60a5fa;
--mono:'IBM Plex Mono',monospace;--display:'Playfair Display',serif;
--goldGrad:linear-gradient(135deg,#c9a84c,#e2c97e,#b8960a);
}
html{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased}
body{min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--borderGold);border-radius:3px}
button{font-family:var(--mono);cursor:pointer;border:none;outline:none}
input,select{font-family:var(--mono);outline:none}
a{color:var(--blue);text-decoration:none}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes tickerScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 8px rgba(201,168,76,0.15)}50%{box-shadow:0 0 20px rgba(201,168,76,0.35)}}
@keyframes spin{to{transform:rotate(360deg)}}
.fi{animation:fadeIn .45s ease both}.fd1{animation:fadeIn .45s ease .1s both}.fd2{animation:fadeIn .45s ease .2s both}.fd3{animation:fadeIn .45s ease .3s both}
#topbar{position:sticky;top:0;z-index:100;background:rgba(6,8,15,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:50px}
.logo{font-family:var(--display);font-size:20px;font-weight:800;background:var(--goldGrad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px}
.logo sub{font-family:var(--mono);font-size:9px;font-weight:400;-webkit-text-fill-color:var(--textMid);margin-left:6px;letter-spacing:0}
.nav{display:flex;gap:3px;flex-wrap:wrap}.nav button{padding:5px 10px;border-radius:4px;font-size:10px;font-weight:500;background:transparent;color:var(--textMid);transition:all .2s;letter-spacing:.4px;text-transform:uppercase}
.nav button:hover{color:var(--gold);background:var(--goldDim)}.nav button.act{color:var(--gold);background:var(--goldDimB);border:1px solid var(--borderGold)}
.nav button.hc::after{content:attr(data-c);margin-left:4px;font-size:8px;background:var(--gold);color:var(--bg);padding:1px 4px;border-radius:7px;font-weight:700}
.rbadge{font-size:9px;padding:3px 8px;border-radius:3px;font-weight:600;letter-spacing:.5px;border:1px solid var(--borderGold);color:var(--gold);background:var(--goldDim)}
#app{max-width:1440px;margin:0 auto;padding:14px 20px 50px}
.edu-banner{background:rgba(96,165,250,0.06);border:1px solid rgba(96,165,250,0.15);border-radius:5px;padding:8px 14px;font-size:10px;color:var(--blue);display:flex;align-items:center;gap:8px;margin-bottom:14px}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:18px 20px;margin-bottom:14px}
.panel h3{font-size:12px;font-weight:600;color:var(--gold);margin-bottom:14px;letter-spacing:.5px;text-transform:uppercase}
.tag{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:500;display:inline-block}
.tag.rc{color:var(--green);background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.2)}
.tag.rm{color:var(--orange);background:rgba(251,146,60,0.1);border:1px solid rgba(251,146,60,0.2)}
.tag.ra{color:var(--red);background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.2)}
.tag.vw{color:var(--blue);background:rgba(96,165,250,0.1);border:1px solid rgba(96,165,250,0.15)}
.btn-gold{padding:10px 28px;border-radius:5px;font-size:11px;font-weight:600;background:var(--goldGrad);color:#06080f;letter-spacing:.5px;text-transform:uppercase;transition:all .2s}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(201,168,76,0.25)}
.btn-gold.dis{opacity:.35;pointer-events:none}
.btn-sec{padding:6px 14px;border-radius:4px;font-size:10px;font-weight:500;background:var(--surfaceUp);border:1px solid var(--border);color:var(--textMid);transition:all .2s}
.btn-sec:hover{border-color:var(--gold);color:var(--gold)}
.sp{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle}
.risk-screen{display:flex;flex-direction:column;align-items:center;padding-top:50px}
.risk-screen h1{font-family:var(--display);font-size:40px;font-weight:800;background:var(--goldGrad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:3px}
.rcard{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:22px 26px;width:100%;max-width:500px;margin-bottom:16px}
.rcard label{display:block;color:var(--gold);font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px}
.rcard .opt{padding:9px 13px;border-radius:4px;font-size:11px;background:var(--surfaceUp);border:1px solid var(--border);color:var(--textMid);cursor:pointer;transition:all .2s;text-align:left;margin-bottom:5px}
.rcard .opt:hover{border-color:var(--borderGold);color:var(--text)}
.rcard .opt.sel{border-color:var(--gold);color:var(--gold);background:var(--goldDim)}
.tw{overflow:hidden;border-bottom:1px solid var(--border);background:var(--surface);margin:-14px -20px 16px}
.tt{display:flex;white-space:nowrap;animation:tickerScroll 200s linear infinite;will-change:transform}
.tw:hover .tt{animation-play-state:paused}
.ti{display:inline-flex;align-items:center;gap:7px;padding:7px 14px;font-size:10px;color:var(--textMid);border-right:1px solid var(--border);flex-shrink:0;cursor:pointer;transition:all .15s}
.ti:hover{background:var(--surfaceUp)}.ti .sym{color:var(--gold);font-weight:600}
.dtabs{display:flex;gap:3px}.dtabs button{padding:7px 14px;border-radius:4px;font-size:10px;font-weight:500;background:transparent;color:var(--textMid);transition:all .2s;letter-spacing:.5px;text-transform:uppercase;border:1px solid transparent}
.dtabs button.act{color:var(--gold);background:var(--goldDim);border-color:var(--borderGold)}
.fbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.fbar input{flex:1;min-width:180px;padding:7px 10px;border-radius:4px;font-size:11px;background:var(--surfaceUp);border:1px solid var(--border);color:var(--text)}
.fbar input:focus{border-color:var(--gold)}
.fbar select{padding:7px 10px;border-radius:4px;font-size:10px;background:var(--surfaceUp);border:1px solid var(--border);color:var(--textMid);min-width:110px}
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.scard{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:14px 16px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.scard:hover{border-color:var(--borderGold);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.3)}
.scard .nm{font-size:12px;font-weight:600;color:var(--text);margin-bottom:5px;display:flex;align-items:center;gap:5px}
.scard .rec{font-size:8px;color:var(--gold);background:var(--goldDim);padding:2px 5px;border-radius:3px;font-weight:700}
.scard .why{font-size:9px;color:var(--green);margin-top:6px;padding:5px 8px;background:rgba(52,211,153,0.06);border-radius:3px;border:1px solid rgba(52,211,153,0.1);line-height:1.4}
.scard .ii{position:absolute;top:10px;right:10px;width:16px;height:16px;border-radius:50%;border:1px solid var(--borderGold);color:var(--gold);font-size:9px;display:flex;align-items:center;justify-content:center;cursor:help}
.scard .tip{display:none;position:absolute;top:30px;right:6px;z-index:10;background:var(--surfaceUp);border:1px solid var(--borderGold);border-radius:4px;padding:8px 10px;font-size:10px;color:var(--textMid);width:220px;line-height:1.5;white-space:normal;box-shadow:0 6px 20px rgba(0,0,0,0.5)}
.scard .ii:hover+.tip{display:block}
.btabs{display:flex;gap:2px;margin-bottom:16px;background:var(--surface);border-radius:5px;padding:3px;border:1px solid var(--border)}
.btabs button{flex:1;padding:7px 4px;border-radius:3px;font-size:9px;font-weight:500;background:transparent;color:var(--textMid);transition:all .2s;text-transform:uppercase}
.btabs button.act{color:var(--gold);background:var(--goldDimB)}
.btabs .nm{display:inline-block;width:15px;height:15px;line-height:15px;text-align:center;border-radius:50%;font-size:8px;margin-right:3px;background:var(--surfaceUp);border:1px solid var(--border)}
.btabs button.act .nm{background:var(--goldDim);border-color:var(--gold);color:var(--gold)}
.tbl{width:100%;border-collapse:collapse;font-size:11px}
.tbl th{text-align:left;padding:7px;color:var(--textDim);font-weight:500;font-size:9px;text-transform:uppercase;border-bottom:1px solid var(--border)}
.tbl td{padding:6px 7px;border-bottom:1px solid rgba(28,35,51,0.4);color:var(--text)}
.tbl select,.tbl input{background:var(--surfaceUp);border:1px solid var(--border);border-radius:3px;color:var(--text);padding:4px 5px;font-size:10px;width:100%}
.chart-svg{width:100%;height:280px;background:var(--surfaceUp);border-radius:5px;border:1px solid var(--border)}
.assume{background:rgba(201,168,76,0.04);border:1px solid var(--borderGold);border-radius:5px;padding:12px 14px;font-size:10px;color:var(--textMid);line-height:1.7}
.assume .at{font-size:10px;color:var(--gold);font-weight:600;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.assume .row{display:flex;justify-content:space-between;padding:2px 0}
.assume .lim{margin-top:8px;padding-top:8px;border-top:1px solid var(--borderGold);color:var(--textDim);font-size:9px;line-height:1.5}
.val-warn{background:rgba(251,146,60,0.08);border:1px solid rgba(251,146,60,0.2);border-radius:4px;padding:8px 12px;font-size:10px;color:var(--orange);margin-bottom:10px}
.rwarn{background:rgba(248,113,113,0.06);border:1px solid rgba(248,113,113,0.15);border-radius:4px;padding:10px 14px;margin-bottom:12px;font-size:10px;color:var(--red);line-height:1.6}
.rwarn .wt{font-weight:700;margin-bottom:3px;font-size:11px}
.port-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:16px}
.port-stat{background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:12px 14px}
.port-stat .lab{font-size:9px;color:var(--textDim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.port-stat .val{font-size:17px;font-weight:700}
.port-stat .sub{font-size:9px;color:var(--textMid);margin-top:2px}
.conc-warn{background:rgba(248,113,113,0.06);border:1px solid rgba(248,113,113,0.15);border-radius:4px;padding:8px 12px;font-size:10px;color:var(--red);margin-bottom:10px}
.tl-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:12px 16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;transition:border-color .2s}
.tl-card:hover{border-color:var(--borderGold)}.tl-card.new{animation:glowPulse 1.5s ease 2}
.cmp-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.cmp-col{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:16px}
.cmp-col h4{font-size:11px;color:var(--gold);font-weight:600;margin-bottom:10px}
.it{width:100%;border-collapse:collapse;font-size:10px}
.it th{text-align:left;padding:8px 10px;color:var(--textDim);font-size:9px;text-transform:uppercase;border-bottom:1px solid var(--border)}
.it td{padding:8px 10px;border-bottom:1px solid rgba(28,35,51,0.4);vertical-align:top}
.ibadge{display:inline-block;padding:1px 5px;border-radius:3px;font-size:8px;font-weight:600;color:var(--gold);background:var(--goldDim);border:1px solid var(--borderGold)}
.meth-section{margin-bottom:20px}
.meth-section h4{font-size:12px;color:var(--gold);font-weight:600;margin-bottom:8px}
.meth-section p{font-size:11px;color:var(--textMid);line-height:1.7;margin-bottom:8px}
.meth-section code{background:var(--surfaceUp);padding:1px 5px;border-radius:3px;font-size:10px;color:var(--goldLight)}
.meth-formula{background:var(--surfaceUp);border:1px solid var(--border);border-radius:4px;padding:10px 14px;font-size:11px;color:var(--text);margin:8px 0;overflow-x:auto}
.modal-ov{position:fixed;inset:0;z-index:200;background:rgba(6,8,15,0.85);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;animation:fadeIn .3s ease}
.modal-box{background:var(--surface);border:1px solid var(--borderGold);border-radius:8px;padding:28px;max-width:400px;width:90%;text-align:center;animation:glowPulse 2s ease infinite}
@media(max-width:768px){#app{padding:10px 10px 40px}.sgrid{grid-template-columns:1fr}.cmp-grid{grid-template-columns:1fr}.port-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>

{name:'Covered Call',risk:'Conservative',view:'Neutral/Bullish',legs:[{dir:'Long',type:'Stock'},{dir:'Short',type:'Call'}],desc:'Own shares, sell a call above. Collect premium, cap upside.',tip:'You own the stock and sell the right to buy it at a higher price.',why:{Conservative:'Ideal for your profile \u2014 generates income with downside buffer.',Moderate:'Good income strategy with owned shares.',Aggressive:'Conservative but excellent for diversification.'}},

{name:'Collar',risk:'Conservative',view:'Neutral',legs:[{dir:'Long',type:'Stock'},{dir:'Long',type:'Put'},{dir:'Short',type:'Call'}],desc:'Own shares, buy put floor, sell call ceiling.',tip:'Bounded range \u2014 give up upside to finance downside protection.',why:{Conservative:'Excellent \u2014 zero-cost protection by financing put with call.',Moderate:'Strong risk management for concentrated positions.',Aggressive:'Very defensive \u2014 use to reduce portfolio volatility.'}},

// BLACK-SCHOLES with dividend yield
function nCDF(x){const a1=.254829592,a2=-.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=.3275911;const s=x<0?-1:1;x=Math.abs(x)/Math.sqrt(2);const t=1/(1+p*x);return .5*(1+s*(1-((((a5*t+a4)*t+a3)*t+a2)*t+a1)*t*Math.exp(-x*x)))}
function nPDF(x){return Math.exp(-.5*x*x)/Math.sqrt(2*Math.PI)}
function bsP(S,K,T,r,q,sig,type){if(T<=0)return type==='Call'?Math.max(S-K,0):Math.max(K-S,0);const d1=(Math.log(S/K)+(r-q+.5*sig*sig)*T)/(sig*Math.sqrt(T)),d2=d1-sig*Math.sqrt(T);return type==='Call'?S*Math.exp(-q*T)*nCDF(d1)-K*Math.exp(-r*T)*nCDF(d2):K*Math.exp(-r*T)*nCDF(-d2)-S*Math.exp(-q*T)*nCDF(-d1)}
function bsG(S,K,T,r,q,sig,type){if(T<=0)return{delta:type==='Call'?(S>K?1:0):(S<K?-1:0),gamma:0,theta:0,vega:0,rho:0};const d1=(Math.log(S/K)+(r-q+.5*sig*sig)*T)/(sig*Math.sqrt(T)),d2=d1-sig*Math.sqrt(T),sqT=Math.sqrt(T);let delta,theta,rho;if(type==='Call'){delta=Math.exp(-q*T)*nCDF(d1);theta=(-S*Math.exp(-q*T)*nPDF(d1)*sig/(2*sqT)+q*S*Math.exp(-q*T)*nCDF(d1)-r*K*Math.exp(-r*T)*nCDF(d2))/365;rho=K*T*Math.exp(-r*T)*nCDF(d2)/100}else{delta=Math.exp(-q*T)*(nCDF(d1)-1);theta=(-S*Math.exp(-q*T)*nPDF(d1)*sig/(2*sqT)-q*S*Math.exp(-q*T)*nCDF(-d1)+r*K*Math.exp(-r*T)*nCDF(-d2))/365;rho=-K*T*Math.exp(-r*T)*nCDF(-d2)/100}return{delta,gamma:Math.exp(-q*T)*nPDF(d1)/(S*sig*sqT),theta,vega:S*Math.exp(-q*T)*nPDF(d1)*sqT/100,rho}}
function lPrem(l,spot){if(l.type==='Stock')return 0;return bsP(spot,l.strike,l.dte/365,ST.riskFreeRate/100,ST.dividendYield/100,l.iv/100,l.type)*(l.dir==='Long'?-1:1)*l.qty*100}
function lGreeks(l,spot){if(l.type==='Stock')return{delta:l.dir==='Long'?l.qty:-l.qty,gamma:0,theta:0,vega:0,rho:0};const g=bsG(spot,l.strike,l.dte/365,ST.riskFreeRate/100,ST.dividendYield/100,l.iv/100,l.type);const m=l.dir==='Long'?1:-1;return{delta:g.delta*m*l.qty,gamma:g.gamma*m*l.qty,theta:g.theta*m*l.qty,vega:g.vega*m*l.qty,rho:g.rho*m*l.qty}}
function payoff(legs,spot,px){let pnl=0;const r=ST.riskFreeRate/100,q=ST.dividendYield/100;legs.forEach(l=>{const m=l.dir==='Long'?1:-1;if(l.type==='Stock')pnl+=(px-spot)*l.qty*m;else{const intr=l.type==='Call'?Math.max(px-l.strike,0):Math.max(l.strike-px,0);pnl+=(intr-bsP(spot,l.strike,l.dte/365,r,q,l.iv/100,l.type))*l.qty*m*100}});return pnl}

function defaultLegs(strat,spot){return strat.legs.map((l,i)=>{const base={qty:1,dte:30,iv:30};if(l.type==='Stock')return{...base,...l,strike:spot,iv:0,dte:0};let strike=spot;const off=Math.round(spot*.05),n=strat.name;if(n==='Bull Call Spread')strike=i===0?spot:spot+off;else if(n==='Bear Put Spread')strike=i===0?spot+off:spot;else if(n==='Bull Put Spread')strike=i===0?spot:spot-off;else if(n==='Bear Call Spread')strike=i===0?spot:spot+off;else if(n==='Iron Condor')strike=[spot-off,spot-2*off,spot+off,spot+2*off][i]||spot;else if(n==='Iron Butterfly')strike=[spot,spot-off,spot,spot+off][i]||spot;else if(n==='Butterfly Spread')strike=[spot-off,spot,spot,spot+off][i]||spot;else if(n.includes('Strangle'))strike=l.type==='Call'?spot+off:spot-off;else if(n==='Put Ratio Spread')strike=i===0?spot:spot-off;else if(n==='Risk Reversal')strike=l.type==='Put'?spot-off:spot+off;else if(n==='Collar'){if(l.type==='Put')strike=spot-off;if(l.type==='Call'&&l.dir==='Short')strike=spot+off}else if(n==='Diagonal Spread')strike=i===1?spot+Math.round(spot*.03):spot;return{...base,...l,strike:Math.round(strike),iv:30}})}
function deriveRisk(a){const s=a[0]+a[1]+a[2];return s<=3?'Conservative':s<=6?'Moderate':'Aggressive'}

// VALIDATION
function validateLegs(legs,spot){const w=[];legs.forEach((l,i)=>{if(l.type!=='Stock'){if(l.strike<=0)w.push('Leg '+(i+1)+': Strike must be positive');if(l.iv<=0||l.iv>200)w.push('Leg '+(i+1)+': IV '+l.iv+'% seems unrealistic (10-100% typical)');if(l.dte<=0)w.push('Leg '+(i+1)+': DTE must be positive');if(l.dte>730)w.push('Leg '+(i+1)+': DTE >730 days \u2014 LEAPS pricing less reliable')}});const shorts=legs.filter(l=>l.dir==='Short'&&l.type!=='Stock');if(shorts.length>0&&legs.filter(l=>l.dir==='Long'&&l.type!=='Stock').length===0&&legs.every(l=>l.type!=='Stock'))w.push('All option legs are short \u2014 naked exposure');const dtes=[...new Set(legs.filter(l=>l.type!=='Stock').map(l=>l.dte))];if(dtes.length>1&&!ST.selectedStrategy?.name.includes('Calendar')&&!ST.selectedStrategy?.name.includes('Diagonal'))w.push('Mixed DTEs ('+dtes.join(', ')+' days) \u2014 legs should share expiry unless intentional');return w}

// PORTFOLIO ANALYTICS
function portAnalytics(){const t=ST.trades;if(!t.length)return null;let tp=0,td=0,tg=0,tt=0,tv=0;const byS={},byT={},byR={Conservative:0,Moderate:0,Aggressive:0};let md=0,rp=0,pp=0;
t.forEach(tr=>{tp+=tr.netPremium;rp+=tr.netPremium;if(rp>pp)pp=rp;if(pp-rp>md)md=pp-rp;byS[tr.strategy]=(byS[tr.strategy]||0)+1;byT[tr.ticker]=(byT[tr.ticker]||0)+1;byR[tr.risk]=(byR[tr.risk]||0)+1;tr.legs.forEach(l=>{const g=lGreeks(l,tr.spot);td+=g.delta;tg+=g.gamma;tt+=g.theta;tv+=g.vega})});
const cw=[];const mt=Math.max(...Object.values(byT));const top=Object.entries(byT).find(([k,v])=>v===mt);
if(top&&top[1]>=3&&top[1]/t.length>.3)cw.push('High concentration in '+top[0]+' ('+top[1]+'/'+t.length+' trades)');
if(byR.Aggressive/t.length>.5&&ST.riskTier!=='Aggressive')cw.push((byR.Aggressive/t.length*100).toFixed(0)+'% Aggressive trades exceeds your '+ST.riskTier+' profile');
if(td>5)cw.push('Net delta +'+td.toFixed(1)+' \u2014 heavily long');if(td<-5)cw.push('Net delta '+td.toFixed(1)+' \u2014 heavily short');
return{tp,td,tg,tt,tv,byS,byT,byR,md,cw,n:t.length}}

if(ST.intelData)return'<div class="panel fi"><h3>Intelligence Brief <span style="font-size:9px;color:'+C.green+';font-weight:400;text-transform:none">\u25cf Live</span></h3><div style="overflow-x:auto"><table class="it"><thead><tr><th>Section</th><th>Item</th><th>Latest</th><th>Move</th><th>Interpretation</th><th>Source</th><th>Ticker</th></tr></thead><tbody>'+ST.intelData.map(r=>'<tr><td style="color:'+C.gold+';font-weight:600;font-size:9px;text-transform:uppercase">'+r.section+'</td><td style="color:'+C.text+'">'+r.item+'</td><td style="color:'+C.textMid+'">'+r.latest+'</td><td style="color:'+((r.move||'').includes('\u25b2')?C.green:(r.move||'').includes('\u25bc')?C.red:C.textMid)+'">'+r.move+'</td><td style="color:'+C.textMid+'">'+r.interpretation+'</td><td style="color:'+C.blue+';font-size:9px">'+r.sources+'</td><td><span class="ibadge">'+r.ticker+'</span></td></tr>').join('')+'</tbody></table></div><div style="margin-top:10px;text-align:right"><button class="btn-sec" onclick="ST.intelFetched=false;ST.intelData=null;fetchIntel()">\u21bb Refresh</button></div></div>';
return'<div class="panel"><h3>Intelligence Brief</h3><div style="text-align:center;padding:20px"><span class="sp"></span> Initializing...</div></div>'}

// BUILDER
function rBuilder(el){const st=ST.selectedStrategy;if(!st){el.innerHTML='<p style="color:'+C.textMid+'">No strategy selected. <a href="#" onclick="goTo(\'dashboard\');return false">Dashboard</a></p>';return}
const tabs=['Legs','Payoff','Greeks','Scenarios','Review'];
el.innerHTML='<div class="edu-banner"><span style="font-size:14px;opacity:.7">\ud83c\udf93</span> Paper Trading Mode \u2014 Simulated environment. <a href="#" onclick="goTo(\'methodology\');return false">View assumptions</a></div>'
+'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid '+C.border+'" class="fi"><h2 style="font-family:var(--display);font-size:20px;font-weight:700;background:var(--goldGrad);-webkit-background-clip:text;-webkit-text-fill-color:transparent">'+st.name+'</h2><div style="font-size:10px;color:'+C.textMid+'"><span style="color:'+C.gold+';font-weight:600">'+ST.selectedTicker+'</span> \u00b7 $'+ST.spotPrice.toFixed(2)+'</div></div>'
+'<div class="btabs fd1">'+tabs.map((t,i)=>'<button class="'+(ST.builderTab===i?'act':'')+'" onclick="ST.builderTab='+i+';render()"><span class="nm">'+(i+1)+'</span>'+t+'</button>').join('')+'</div>'
+'<div style="display:grid;grid-template-columns:1fr 230px;gap:12px" class="fd2"><div>'+[rLegs,rPayoff,rGreeksTab,rScen,rReview][ST.builderTab]()+'</div><div>'+rAssumptions()+'</div></div>'}

function rAssumptions(){return'<div class="assume"><div class="at">Model Assumptions</div>'
+'<div class="row"><span style="color:'+C.textDim+'">Model</span><span style="color:'+C.text+';font-weight:500">Black-Scholes-Merton</span></div>'
+'<div class="row"><span style="color:'+C.textDim+'">Risk-Free (r)</span><span><input type="number" value="'+ST.riskFreeRate+'" step="0.1" style="width:45px;background:'+C.surfaceUp+';border:1px solid '+C.border+';border-radius:2px;color:'+C.text+';padding:2px 3px;font-size:10px;text-align:right" onchange="ST.riskFreeRate=+this.value;render()"/>%</span></div>'
+'<div class="row"><span style="color:'+C.textDim+'">Div Yield (q)</span><span><input type="number" value="'+ST.dividendYield+'" step="0.1" style="width:45px;background:'+C.surfaceUp+';border:1px solid '+C.border+';border-radius:2px;color:'+C.text+';padding:2px 3px;font-size:10px;text-align:right" onchange="ST.dividendYield=+this.value;render()"/>%</span></div>'
+'<div class="row"><span style="color:'+C.textDim+'">Volatility</span><span style="color:'+C.text+'">Per-leg</span></div>'
+'<div class="row"><span style="color:'+C.textDim+'">Exercise</span><span style="color:'+C.text+'">European*</span></div>'
+'<div class="row"><span style="color:'+C.textDim+'">Time</span><span style="color:'+C.text+'">Calendar days</span></div>'
+'<div class="lim"><strong style="color:'+C.orange+'">Limitations:</strong><br/>\u2022 Constant \u03c3 and r assumed<br/>\u2022 No vol smile/skew<br/>\u2022 *European exercise only<br/>\u2022 No transaction costs/slippage<br/>\u2022 Continuous dividend yield</div></div>'}

function rLegs(){const spot=ST.spotPrice;let total=0;ST.legs.forEach(l=>total+=lPrem(l,spot));const warns=validateLegs(ST.legs,spot);
let h='<div class="panel"><h3>Option Legs</h3>';
warns.forEach(w=>{h+='<div class="val-warn">\u26a0 '+w+'</div>'});
h+='<div style="overflow-x:auto"><table class="tbl"><thead><tr><th>#</th><th>Dir</th><th>Type</th><th>Strike</th><th>DTE</th><th>IV%</th><th>Qty</th><th>Prem</th><th>\u0394</th><th>\u0393</th><th>\u0398</th><th>V</th><th></th></tr></thead><tbody>';
ST.legs.forEach((l,i)=>{const p=lPrem(l,spot),g=lGreeks(l,spot);
h+='<tr><td style="color:'+C.gold+';font-weight:600">'+(i+1)+'</td>'
+'<td><select onchange="ST.legs['+i+'].dir=this.value;render()"><option '+(l.dir==='Long'?'selected':'')+'>Long</option><option '+(l.dir==='Short'?'selected':'')+'>Short</option></select></td>'
+'<td><select onchange="ST.legs['+i+'].type=this.value;render()"><option '+(l.type==='Call'?'selected':'')+'>Call</option><option '+(l.type==='Put'?'selected':'')+'>Put</option><option '+(l.type==='Stock'?'selected':'')+'>Stock</option></select></td>'
+'<td><input type="number" value="'+l.strike+'" onchange="ST.legs['+i+'].strike=+this.value;render()" style="width:60px"/></td>'
+'<td><input type="number" value="'+l.dte+'" onchange="ST.legs['+i+'].dte=+this.value;render()" style="width:45px"/></td>'
+'<td><input type="number" value="'+l.iv+'" onchange="ST.legs['+i+'].iv=+this.value;render()" style="width:45px"/></td>'
+'<td><input type="number" value="'+l.qty+'" min="1" onchange="ST.legs['+i+'].qty=+this.value;render()" style="width:40px"/></td>'
+'<td style="color:'+C.gold+';font-weight:600">'+(p>=0?'+':'')+'$'+p.toFixed(0)+'</td>'
+'<td style="font-size:9px;color:'+C.textMid+'">'+g.delta.toFixed(3)+'</td><td style="font-size:9px;color:'+C.textMid+'">'+g.gamma.toFixed(4)+'</td>'
+'<td style="font-size:9px;color:'+C.textMid+'">'+g.theta.toFixed(2)+'</td><td style="font-size:9px;color:'+C.textMid+'">'+g.vega.toFixed(2)+'</td>'
+'<td>'+(ST.legs.length>1?'<button style="background:none;border:none;color:'+C.red+';cursor:pointer;font-size:12px;opacity:.5" onclick="ST.legs.splice('+i+',1);render()">\u2715</button>':'')+'</td></tr>'});
h+='</tbody></table></div><div style="display:flex;align-items:center;justify-content:space-between;margin-top:12px"><button class="btn-sec" onclick="ST.legs.push({dir:\'Long\',type:\'Call\',strike:ST.spotPrice,qty:1,dte:30,iv:30});render()">+ Add Leg</button><div style="font-size:11px">Net: <span style="color:'+(total>=0?C.green:C.red)+';font-weight:600">'+(total>=0?'+':'')+'$'+total.toFixed(0)+'</span></div></div></div>';return h}

function rPayoff(){const spot=ST.spotPrice,lo=spot*.7,hi=spot*1.3,steps=200,dx=(hi-lo)/steps;let pts=[],mn=1e9,mx=-1e9;for(let i=0;i<=steps;i++){const px=lo+i*dx,pnl=payoff(ST.legs,spot,px);pts.push({x:px,y:pnl});if(pnl<mn)mn=pnl;if(pnl>mx)mx=pnl}
const pad=(mx-mn)*.15||50,yMin=mn-pad,yMax=mx+pad,W=700,H=280,ml=55,mr=15,mt=18,mb=35,cw=W-ml-mr,ch=H-mt-mb;
const sx=x=>ml+((x-lo)/(hi-lo))*cw,sy=y=>mt+ch-((y-yMin)/(yMax-yMin))*ch;
let bes=[];for(let i=1;i<pts.length;i++){if((pts[i-1].y<=0&&pts[i].y>=0)||(pts[i-1].y>=0&&pts[i].y<=0)){bes.push(pts[i-1].x+(-pts[i-1].y/(pts[i].y-pts[i-1].y))*dx)}}
let path='';pts.forEach((p,i)=>path+=(i?'L':'M')+sx(p.x).toFixed(1)+','+sy(p.y).toFixed(1));
return'<div class="panel"><h3>Payoff at Expiry</h3><svg viewBox="0 0 '+W+' '+H+'" class="chart-svg">'
+'<line x1="'+ml+'" y1="'+sy(0)+'" x2="'+(W-mr)+'" y2="'+sy(0)+'" stroke="'+C.textDim+'"/>'
+'<clipPath id="pc"><rect x="'+ml+'" y="'+mt+'" width="'+cw+'" height="'+Math.max(sy(0)-mt,0)+'"/></clipPath>'
+'<clipPath id="lc"><rect x="'+ml+'" y="'+sy(0)+'" width="'+cw+'" height="'+Math.max(mt+ch-sy(0),0)+'"/></clipPath>'
+'<path d="'+path+' L'+sx(hi).toFixed(1)+','+sy(0).toFixed(1)+' L'+sx(lo).toFixed(1)+','+sy(0).toFixed(1)+' Z" fill="rgba(52,211,153,0.08)" clip-path="url(#pc)"/>'
+'<path d="'+path+' L'+sx(hi).toFixed(1)+','+sy(0).toFixed(1)+' L'+sx(lo).toFixed(1)+','+sy(0).toFixed(1)+' Z" fill="rgba(248,113,113,0.06)" clip-path="url(#lc)"/>'
+'<path d="'+path+'" fill="none" stroke="'+C.gold+'" stroke-width="2"/>'
+'<line x1="'+sx(spot)+'" y1="'+mt+'" x2="'+sx(spot)+'" y2="'+(mt+ch)+'" stroke="'+C.blue+'" stroke-dasharray="4,4"/>'
+'<text x="'+sx(spot)+'" y="'+(mt-3)+'" text-anchor="middle" fill="'+C.blue+'" font-size="9" font-family="var(--mono)">Spot $'+spot.toFixed(0)+'</text>'
+bes.map(b=>'<circle cx="'+sx(b)+'" cy="'+sy(0)+'" r="3.5" fill="'+C.orange+'"/><text x="'+sx(b)+'" y="'+(sy(0)+14)+'" text-anchor="middle" fill="'+C.orange+'" font-size="8" font-family="var(--mono)">BE $'+b.toFixed(0)+'</text>').join('')
+[0,.5,1].map(f=>{const v=lo+f*(hi-lo);return'<text x="'+sx(v)+'" y="'+(H-6)+'" text-anchor="middle" fill="'+C.textDim+'" font-size="8" font-family="var(--mono)">$'+v.toFixed(0)+'</text>'}).join('')
+'</svg><div style="display:flex;gap:16px;margin-top:10px;font-size:10px;color:'+C.textMid+'"><span>Max Profit: <span style="color:'+C.green+';font-weight:600">+$'+mx.toFixed(0)+'</span></span><span>Max Loss: <span style="color:'+C.red+';font-weight:600">$'+mn.toFixed(0)+'</span></span>'+(bes.length?'<span>BE: '+bes.map(b=>'$'+b.toFixed(1)).join(', ')+'</span>':'')+'</div></div>'}

function rGreeksTab(){const spot=ST.spotPrice;let agg={delta:0,gamma:0,theta:0,vega:0,rho:0};ST.legs.forEach(l=>{const g=lGreeks(l,spot);Object.keys(agg).forEach(k=>agg[k]+=g[k])});
const gd=[{s:'\u0394',n:'Delta',v:agg.delta,h:'P&L per $1 move',c:C.blue},{s:'\u0393',n:'Gamma',v:agg.gamma,h:'Rate of \u0394 change',c:C.green},{s:'\u0398',n:'Theta',v:agg.theta,h:'Daily decay',c:C.red},{s:'V',n:'Vega',v:agg.vega,h:'Per 1% IV',c:C.orange},{s:'\u03c1',n:'Rho',v:agg.rho,h:'Per 1% rate',c:C.textMid}];
const mx=Math.max(...gd.map(g=>Math.abs(g.v)),.01);
return'<div class="panel"><h3>Aggregate Greeks</h3><div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px">'+gd.map(g=>{const pct=Math.min(Math.abs(g.v)/mx*100,100);
return'<div style="text-align:center"><div style="font-size:9px;color:'+C.textMid+';margin-bottom:4px;text-transform:uppercase">'+g.s+' '+g.n+'</div><div style="height:100px;background:'+C.surfaceUp+';border-radius:3px;position:relative;overflow:hidden;border:1px solid '+C.border+'"><div style="position:absolute;bottom:0;left:0;right:0;height:'+pct+'%;background:'+g.c+';opacity:.25"></div><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:'+g.c+'">'+(g.v>=0?'+':'')+g.v.toFixed(g.n==='Gamma'?4:3)+'</div></div><div style="font-size:8px;color:'+C.textDim+';margin-top:3px">'+g.h+'</div></div>'}).join('')+'</div>'
+'<div style="margin-top:14px;padding:10px 12px;background:'+C.surfaceUp+';border-radius:4px;border:1px solid '+C.border+';font-size:10px;color:'+C.textMid+';line-height:1.6"><strong style="color:'+C.gold+'">Summary:</strong> '+(agg.delta>0?'Long \u0394 \u2014 profits from upside.':agg.delta<0?'Short \u0394 \u2014 profits from downside.':'Delta-neutral.')+(agg.theta>0?' +\u0398: earns from decay.':agg.theta<0?' -\u0398: loses daily.':'')+(agg.vega>0?' +V: gains from vol up.':agg.vega<0?' -V: gains from vol down.':'')+'</div></div>'}

function rScen(){const spot=ST.spotPrice;const pms=ST.riskTier==='Conservative'?[-10,-7,-5,-3,0,3,5,7,10]:ST.riskTier==='Moderate'?[-15,-10,-7,-5,0,5,7,10,15]:[-25,-20,-15,-10,-5,0,5,10,15,20,25];
const vs=ST.riskTier==='Conservative'?[-5,0,5]:[-10,0,10];const r=ST.riskFreeRate/100,q=ST.dividendYield/100;
return'<div class="panel"><h3>Scenario Analysis</h3><p style="font-size:10px;color:'+C.textMid+';margin-bottom:10px">Range calibrated to '+ST.riskTier+' profile</p><div style="overflow-x:auto"><table class="tbl" style="text-align:center"><thead><tr><th></th>'+vs.map(v=>'<th>IV '+(v>=0?'+':'')+v+'%</th>').join('')+'</tr></thead><tbody>'+pms.map(pm=>{const ns=spot*(1+pm/100);
return'<tr><td style="color:'+C.gold+';font-weight:600;text-align:left">'+(pm>=0?'+':'')+pm+'% ($'+ns.toFixed(0)+')</td>'+vs.map(vsh=>{let pnl=0;ST.legs.forEach(l=>{if(l.type==='Stock')pnl+=(ns-spot)*l.qty*(l.dir==='Long'?1:-1);else{const niv=Math.max(l.iv+vsh,5);pnl+=(bsP(ns,l.strike,l.dte/365,r,q,niv/100,l.type)-bsP(spot,l.strike,l.dte/365,r,q,l.iv/100,l.type))*l.qty*(l.dir==='Long'?1:-1)*100}});
return'<td style="color:'+(pnl>10?C.green:pnl<-10?C.red:C.textMid)+'">'+(pnl>=0?'+':'')+'$'+pnl.toFixed(0)+'</td>'}).join('')+'</tr>'}).join('')+'</tbody></table></div></div>'}

function rReview(){const st=ST.selectedStrategy,spot=ST.spotPrice;let total=0;ST.legs.forEach(l=>total+=lPrem(l,spot));
const unlim=st.name.includes('Short Straddle')||st.name.includes('Short Strangle')||st.name==='Risk Reversal';
const assign=ST.legs.some(l=>l.dir==='Short'&&l.type!=='Stock');const decay=ST.legs.some(l=>l.dir==='Long'&&l.type!=='Stock');
const mismatch=(ST.riskTier==='Conservative'&&st.risk==='Aggressive')||(ST.riskTier==='Conservative'&&st.risk==='Moderate');
const warns=validateLegs(ST.legs,spot);
let h='<div class="panel"><h3>Review & Confirm</h3>';
if(mismatch)h+='<div class="rwarn"><div class="wt">\u26a0 Risk Profile Mismatch</div>This '+st.risk+' strategy exceeds your '+ST.riskTier+' profile.</div>';
warns.forEach(w=>{h+='<div class="val-warn">\u26a0 '+w+'</div>'});
h+='<div style="margin-bottom:14px"><div style="font-size:10px;color:'+C.gold+';font-weight:600;text-transform:uppercase;margin-bottom:8px">Order Summary</div>';
[['Strategy',st.name],['Underlying',ST.selectedTicker+' @ $'+spot.toFixed(2)],['Legs',''+ST.legs.length]].forEach(([k,v])=>{h+='<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:11px;border-bottom:1px solid rgba(28,35,51,0.3)"><span style="color:'+C.textMid+'">'+k+'</span><span style="color:'+C.text+';font-weight:500">'+v+'</span></div>'});
ST.legs.forEach((l,i)=>{h+='<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:11px;border-bottom:1px solid rgba(28,35,51,0.3)"><span style="color:'+C.textMid+';padding-left:10px">Leg '+(i+1)+'</span><span style="color:'+C.text+'">'+l.dir+' '+l.qty+'\u00d7 '+l.type+(l.type!=='Stock'?' $'+l.strike+' '+l.dte+'DTE':'')+'</span></div>'});
h+='<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:11px;border-bottom:1px solid rgba(28,35,51,0.3)"><span style="color:'+C.textMid+'">Net Premium</span><span style="color:'+(total>=0?C.green:C.red)+';font-weight:600">'+(total>=0?'+':'')+'$'+total.toFixed(2)+'</span></div>';
h+='<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:11px"><span style="color:'+C.textMid+'">Model</span><span style="color:'+C.text+'">BSM (r='+ST.riskFreeRate+'%, q='+ST.dividendYield+'%)</span></div></div>';
if(unlim)h+='<div class="rwarn"><div class="wt">\u26a0 Unlimited Loss Risk</div>Short naked options can produce losses far exceeding premium.</div>';
if(assign)h+='<div class="rwarn"><div class="wt">\u26a0 Assignment Risk</div>Short options may be assigned anytime (American-style).</div>';
if(decay)h+='<div class="rwarn"><div class="wt">\u26a0 Theta Decay</div>Long options lose value daily.</div>';
h+='<div class="edu-banner" style="margin-bottom:12px"><span style="font-size:14px;opacity:.7">\ud83c\udf93</span> Simulated paper trade. No real money. No exchange orders.</div>';
h+='<div style="display:flex;align-items:center;gap:6px;margin:12px 0;font-size:10px;color:'+C.textMid+'"><input type="checkbox" '+(ST.ack?'checked':'')+' onchange="ST.ack=this.checked;render()" style="accent-color:'+C.gold+'"/><label>I acknowledge the risks, model limitations, and educational nature.</label></div>';
h+='<button class="btn-gold '+(ST.ack?'':'dis')+'" onclick="confirmTrade()">Confirm Paper Trade</button></div>';return h}

// TRADE CONFIRM + LOG
function confirmTrade(){if(!ST.ack)return;const st=ST.selectedStrategy,spot=ST.spotPrice;let total=0;ST.legs.forEach(l=>total+=lPrem(l,spot));const id=Date.now();ST.trades.push({id,strategy:st.name,ticker:ST.selectedTicker,spot,legs:JSON.parse(JSON.stringify(ST.legs)),netPremium:total,risk:st.risk,view:st.view,time:new Date().toISOString()});ST.lastTradeId=id;document.getElementById('modalMsg').textContent=st.name+' on '+ST.selectedTicker+' \u2014 '+ST.legs.length+' leg'+(ST.legs.length>1?'s':'')+' recorded.';document.getElementById('modal').style.display='flex'}
function closeModal(){document.getElementById('modal').style.display='none';ST.screen='tradelog';ST.selectedStrategy=null;ST.legs=[];ST.ack=false;render();window.scrollTo({top:0,behavior:'smooth'})}

function rTLog(el){
let h='<div class="edu-banner"><span style="font-size:14px;opacity:.7">\ud83c\udf93</span> Paper Trade Log \u2014 All entries simulated.</div><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px" class="fi"><h2 style="font-family:var(--display);font-size:20px;font-weight:700;background:var(--goldGrad);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Trade Log</h2><div style="font-size:10px;color:'+C.textMid+'">'+ST.trades.length+' trade'+(ST.trades.length!==1?'s':'')+'</div></div>';
if(!ST.trades.length){h+='<div style="text-align:center;padding:40px 0;color:'+C.textDim+';font-size:11px">No trades yet. <button class="btn-sec" onclick="goTo(\'dashboard\')">Dashboard</button></div>';el.innerHTML=h;return}
const tp=ST.trades.reduce((a,t)=>a+t.netPremium,0);const cr=ST.trades.filter(t=>t.netPremium>0).length;
h+='<div class="port-grid fd1"><div class="port-stat"><div class="lab">Net Premium</div><div class="val" style="color:'+(tp>=0?C.green:C.red)+'">'+(tp>=0?'+':'')+'$'+tp.toFixed(0)+'</div></div><div class="port-stat"><div class="lab">Trades</div><div class="val" style="color:'+C.text+'">'+ST.trades.length+'</div><div class="sub">'+cr+' credit \u00b7 '+(ST.trades.length-cr)+' debit</div></div></div>';
h+='<div class="fd2">';[...ST.trades].reverse().forEach((t,i)=>{const dt=new Date(t.time);const ts=dt.toLocaleDateString('en-GB',{day:'numeric',month:'short'})+' '+dt.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});const isNew=t.id===ST.lastTradeId;
h+='<div class="tl-card '+(isNew?'new':'')+'" style="animation:fadeIn .3s ease '+(i*.04)+'s both"><div style="display:flex;flex-direction:column;gap:2px"><div style="font-size:12px;font-weight:600;color:'+C.text+'">'+t.strategy+(isNew?' <span style="font-size:8px;color:'+C.green+'">\u2713 NEW</span>':'')+'</div><div style="font-size:9px;color:'+C.textMid+'"><span style="color:'+C.gold+'">'+t.ticker+'</span> @ $'+t.spot.toFixed(2)+' \u00b7 '+t.legs.length+' leg'+(t.legs.length>1?'s':'')+'</div></div><div style="text-align:right"><div style="font-size:12px;font-weight:600;color:'+(t.netPremium>=0?C.green:C.red)+'">'+(t.netPremium>=0?'+':'')+'$'+t.netPremium.toFixed(0)+'</div><div style="font-size:9px;color:'+C.textDim+'">'+ts+'</div><button onclick="ST.trades=ST.trades.filter(x=>x.id!=='+t.id+');render()" style="background:none;border:none;color:'+C.textDim+';font-size:9px;cursor:pointer;padding:0">Remove</button></div></div>'});
h+='</div>';el.innerHTML=h}

// PORTFOLIO
function rPort(el){const a=portAnalytics();
let h='<div class="edu-banner"><span style="font-size:14px;opacity:.7">\ud83d\udcca</span> Portfolio Analytics \u2014 Aggregate risk. <a href="#" onclick="goTo(\'methodology\');return false">Methodology</a></div><h2 style="font-family:var(--display);font-size:20px;font-weight:700;background:var(--goldGrad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:14px" class="fi">Portfolio Analytics</h2>';
if(!a){h+='<div style="text-align:center;padding:40px 0;color:'+C.textDim+'">No trades. <button class="btn-sec" onclick="goTo(\'dashboard\')">Dashboard</button></div>';el.innerHTML=h;return}
a.cw.forEach(w=>{h+='<div class="conc-warn fi">\u26a0 '+w+'</div>'});
h+='<div class="port-grid fd1">';
h+='<div class="port-stat"><div class="lab">Net Premium</div><div class="val" style="color:'+(a.tp>=0?C.green:C.red)+'">'+(a.tp>=0?'+':'')+'$'+a.tp.toFixed(0)+'</div></div>';
h+='<div class="port-stat"><div class="lab">Max Drawdown</div><div class="val" style="color:'+C.red+'">-$'+a.md.toFixed(0)+'</div></div>';
h+='<div class="port-stat"><div class="lab">Net \u0394</div><div class="val" style="color:'+C.blue+'">'+(a.td>=0?'+':'')+a.td.toFixed(2)+'</div><div class="sub">'+(a.td>1?'Long':a.td<-1?'Short':'Neutral')+'</div></div>';
h+='<div class="port-stat"><div class="lab">Net \u0398</div><div class="val" style="color:'+C.red+'">'+(a.tt>=0?'+':'')+a.tt.toFixed(2)+'</div><div class="sub">'+(a.tt>0?'Earning':a.tt<0?'Paying':'Neutral')+'/day</div></div>';
h+='<div class="port-stat"><div class="lab">Net Vega</div><div class="val" style="color:'+C.orange+'">'+(a.tv>=0?'+':'')+a.tv.toFixed(2)+'</div><div class="sub">'+(a.tv>0?'Long vol':'Short vol')+'</div></div>';
h+='</div>';
h+='<div class="panel fd2"><h3>P&L by Strategy</h3><table class="tbl"><thead><tr><th>Strategy</th><th>Count</th><th>P&L</th><th>%</th></tr></thead><tbody>';
Object.entries(a.byS).sort((a,b)=>b[1]-a[1]).forEach(([s,c])=>{const pl=ST.trades.filter(t=>t.strategy===s).reduce((x,t)=>x+t.netPremium,0);h+='<tr><td style="color:'+C.text+'">'+s+'</td><td>'+c+'</td><td style="color:'+(pl>=0?C.green:C.red)+'">'+(pl>=0?'+':'')+'$'+pl.toFixed(0)+'</td><td>'+(c/a.n*100).toFixed(0)+'%</td></tr>'});
h+='</tbody></table></div>';
h+='<div class="panel fd3"><h3>Exposure by Ticker</h3><table class="tbl"><thead><tr><th>Ticker</th><th>Trades</th><th>P&L</th><th>Concentration</th></tr></thead><tbody>';
Object.entries(a.byT).sort((a,b)=>b[1]-a[1]).forEach(([t,c])=>{const pl=ST.trades.filter(tr=>tr.ticker===t).reduce((x,tr)=>x+tr.netPremium,0);const pct=c/a.n*100;h+='<tr><td style="color:'+C.gold+'">'+t+'</td><td>'+c+'</td><td style="color:'+(pl>=0?C.green:C.red)+'">'+(pl>=0?'+':'')+'$'+pl.toFixed(0)+'</td><td><div style="display:flex;align-items:center;gap:6px"><div style="width:60px;height:6px;background:'+C.surfaceUp+';border-radius:3px;overflow:hidden"><div style="width:'+pct+'%;height:100%;background:'+(pct>40?C.red:pct>25?C.orange:C.green)+'"></div></div><span style="font-size:9px;color:'+C.textMid+'">'+pct.toFixed(0)+'%</span></div></td></tr>'});
h+='</tbody></table></div>';
h+='<div class="panel"><h3>Risk Distribution</h3><div style="display:flex;gap:12px">';
['Conservative','Moderate','Aggressive'].forEach(r=>{const c=a.byR[r]||0;const pct=a.n?c/a.n*100:0;const col=r==='Conservative'?C.green:r==='Moderate'?C.orange:C.red;
h+='<div style="flex:1;text-align:center"><div style="font-size:9px;color:'+C.textDim+';text-transform:uppercase;margin-bottom:4px">'+r+'</div><div style="height:50px;background:'+C.surfaceUp+';border-radius:3px;position:relative;overflow:hidden;border:1px solid '+C.border+'"><div style="position:absolute;bottom:0;left:0;right:0;height:'+pct+'%;background:'+col+';opacity:.25"></div><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:'+col+'">'+c+'</div></div><div style="font-size:9px;color:'+C.textMid+';margin-top:2px">'+pct.toFixed(0)+'%</div></div>'});
h+='</div></div>';el.innerHTML=h}

// COMPARE
function rComp(el){if(ST.compareStrats.length<2){el.innerHTML='<h2 style="font-family:var(--display);font-size:20px;font-weight:700;background:var(--goldGrad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:14px">Strategy Comparison</h2><div style="text-align:center;padding:30px 0;color:'+C.textMid+'">Select 2 strategies via <a href="#" onclick="ST.compareMode=true;goTo(\'dashboard\');return false">Dashboard Compare Mode</a></div>';return}
if(!ST.selectedTicker){el.innerHTML='<p style="color:'+C.textMid+'">Select a ticker first.</p>';return}
const spot=ST.spotPrice;const strats=ST.compareStrats.map(n=>STRATS.find(s=>s.name===n));const legsArr=strats.map(s=>defaultLegs(s,spot));
const premsArr=legsArr.map(legs=>{let t=0;legs.forEach(l=>t+=lPrem(l,spot));return t});
const greeksArr=legsArr.map(legs=>{let a={delta:0,gamma:0,theta:0,vega:0};legs.forEach(l=>{const g=lGreeks(l,spot);Object.keys(a).forEach(k=>a[k]+=g[k])});return a});
const lo=spot*.75,hi=spot*1.25,steps=150,dx=(hi-lo)/steps;const ptsArr=legsArr.map(legs=>{let pts=[];for(let i=0;i<=steps;i++){const px=lo+i*dx;pts.push({x:px,y:payoff(legs,spot,px)})}return pts});
let allY=ptsArr.flat().map(p=>p.y);let mn=Math.min(...allY),mx=Math.max(...allY);
const pad=(mx-mn)*.15||50,yMin=mn-pad,yMax=mx+pad,W=600,H=250,ml=50,mr=10,mt=15,mb=30,cw=W-ml-mr,ch=H-mt-mb;
const sx=x=>ml+((x-lo)/(hi-lo))*cw,sy=y=>mt+ch-((y-yMin)/(yMax-yMin))*ch;const colors=[C.gold,C.blue];
const paths=ptsArr.map(pts=>{let p='';pts.forEach((pt,i)=>p+=(i?'L':'M')+sx(pt.x).toFixed(1)+','+sy(pt.y).toFixed(1));return p});
let h='<h2 style="font-family:var(--display);font-size:20px;font-weight:700;background:var(--goldGrad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:14px" class="fi">Strategy Comparison</h2>';
h+='<div class="edu-banner">\u21c4 '+strats[0].name+' vs '+strats[1].name+' on '+ST.selectedTicker+' @ $'+spot.toFixed(2)+'</div>';
h+='<div class="panel fd1"><h3>Payoff Comparison</h3><svg viewBox="0 0 '+W+' '+H+'" class="chart-svg"><line x1="'+ml+'" y1="'+sy(0)+'" x2="'+(W-mr)+'" y2="'+sy(0)+'" stroke="'+C.textDim+'"/>';
paths.forEach((p,i)=>{h+='<path d="'+p+'" fill="none" stroke="'+colors[i]+'" stroke-width="2" '+(i===1?'stroke-dasharray="6,3"':'')+'/>'});
h+='</svg><div style="display:flex;gap:16px;margin-top:8px;font-size:10px"><span style="color:'+colors[0]+'">\u2501 '+strats[0].name+'</span><span style="color:'+colors[1]+'">\u2564 '+strats[1].name+'</span></div></div>';
h+='<div class="cmp-grid fd2">';
strats.forEach((s,i)=>{const whyText=s.why?.[ST.riskTier]||'';
h+='<div class="cmp-col"><h4>'+s.name+'</h4><div style="margin-bottom:8px"><span class="tag '+(s.risk==='Conservative'?'rc':s.risk==='Moderate'?'rm':'ra')+'">'+s.risk+'</span> <span class="tag vw">'+s.view+'</span></div><div style="font-size:10px;color:'+C.textMid+';line-height:1.6;margin-bottom:10px">'+s.desc+'</div>'+(whyText?'<div style="font-size:9px;color:'+C.green+';padding:5px 8px;background:rgba(52,211,153,0.06);border-radius:3px;margin-bottom:10px">\ud83d\udca1 '+whyText+'</div>':'')+'<div style="font-size:10px"><span style="color:'+C.textDim+'">Net Premium:</span> <span style="color:'+(premsArr[i]>=0?C.green:C.red)+';font-weight:600">'+(premsArr[i]>=0?'+':'')+'$'+premsArr[i].toFixed(0)+'</span></div><div style="font-size:9px;color:'+C.textDim+';margin-top:6px">\u0394 '+greeksArr[i].delta.toFixed(3)+' \u00b7 \u0393 '+greeksArr[i].gamma.toFixed(4)+' \u00b7 \u0398 '+greeksArr[i].theta.toFixed(3)+' \u00b7 V '+greeksArr[i].vega.toFixed(3)+'</div></div>'});
h+='</div><div style="margin-top:14px;text-align:center"><button class="btn-sec" onclick="ST.compareStrats=[];ST.compareMode=true;goTo(\'dashboard\')">Compare Others</button></div>';
el.innerHTML=h}

// METHODOLOGY
function rMeth(el){el.innerHTML='<h2 style="font-family:var(--display);font-size:20px;font-weight:700;background:var(--goldGrad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:16px" class="fi">Methodology & Documentation</h2>'
+'<div class="edu-banner">\ud83d\udcd6 Architecture, pricing logic, assumptions, and limitations.</div>'
+'<div class="panel fd1"><div class="meth-section"><h4>1. Platform Architecture</h4><p>OPTIX is a single-page application in vanilla HTML/CSS/JS. Central state object (<code>ST</code>) drives rendering via <code>render()</code>. Data: Yahoo Finance via CORS proxy for 15-min delayed prices. Anthropic Claude API with web_search for intelligence. All options pricing computed client-side.</p></div></div>'
+'<div class="panel fd2"><div class="meth-section"><h4>2. Black-Scholes-Merton Model</h4><p>Options priced using BSM with continuous dividend yield extension.</p><div class="meth-formula">C = S\u00b7e^(-qT)\u00b7N(d\u2081) - K\u00b7e^(-rT)\u00b7N(d\u2082)<br/>P = K\u00b7e^(-rT)\u00b7N(-d\u2082) - S\u00b7e^(-qT)\u00b7N(-d\u2081)<br/><br/>d\u2081 = [ln(S/K) + (r-q+\u03c3\u00b2/2)\u00b7T] / (\u03c3\u221aT)<br/>d\u2082 = d\u2081 - \u03c3\u221aT</div><p>S=spot, K=strike, T=time(years), r=risk-free rate, q=div yield, \u03c3=implied vol.</p></div></div>'
+'<div class="panel fd3"><div class="meth-section"><h4>3. Greeks</h4><div class="meth-formula">\u0394 = \u2202V/\u2202S &nbsp;&nbsp; \u0393 = \u2202\u00b2V/\u2202S\u00b2 &nbsp;&nbsp; \u0398 = \u2202V/\u2202t \u00f7 365<br/>Vega = \u2202V/\u2202\u03c3 \u00f7 100 &nbsp;&nbsp; \u03c1 = \u2202V/\u2202r \u00f7 100</div><p>Multi-leg: per-leg Greeks aggregated with direction multipliers (\u00b11) \u00d7 quantity.</p></div></div>'
+'<div class="panel"><div class="meth-section"><h4>4. Assumptions & Limitations</h4><p><strong>Assumes:</strong> Constant \u03c3 and r. Log-normal returns. Continuous trading. European exercise. Continuous dividend yield. No transaction costs.</p><p><strong>Limits:</strong> No vol smile/skew. No American early exercise premium. No jump/stochastic vol. Greeks are point-in-time. Dividends approximated as continuous.</p></div></div>'
+'<div class="panel"><div class="meth-section"><h4>5. Risk Profiling</h4><p>3 inputs scored 0-2 (experience, objective, tolerance). Composite 0-8 maps to Conservative (0-3), Moderate (4-6), Aggressive (7-8). Drives: strategy recommendations with tier-specific explanations, warning escalation, scenario range calibration (\u00b110/\u00b115/\u00b125%), portfolio concentration alerts.</p></div></div>'
+'<div class="panel"><div class="meth-section"><h4>6. Portfolio Analytics</h4><p>Aggregates: net premium, portfolio Greeks, P&L by strategy and ticker, risk tier distribution, max drawdown, concentration warnings.</p></div></div>'
+'<div class="panel"><div class="meth-section"><h4>7. Strategy Comparison</h4><p>Side-by-side payoff, Greeks, premiums, and tier-specific recommendations for two strategies on the same underlying.</p></div></div>'
+'<div class="panel"><div class="meth-section"><h4>8. 20 Strategies</h4><p>Conservative: Covered Call, Cash-Secured Put, Protective Put, Collar. Moderate: Bull/Bear Call/Put Spreads, Iron Condor, Iron Butterfly, Butterfly, Calendar, Diagonal, The Wheel. Aggressive: Long/Short Straddle/Strangle, Put Ratio Spread, Risk Reversal.</p></div></div>'
+'<div style="text-align:center;padding:20px 0;font-size:10px;color:'+C.textDim+'">OPTIX_byParth \u2014 MSc Investments, University of Birmingham<br/>Educational use only. Not financial advice.</div>'}

function goTo(s){ST.screen=s;render();window.scrollTo({top:0,behavior:'smooth'})}
ALL.forEach(t=>simP(t));render();
